<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoastalClean - Hazte Voluntario</title>
     <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <nav>
        <div class="logo">CoastalClean</div>
        <a href="index.html">Inicio</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="articulos.html">Artículos</a>
        <a href="registro.html" class="active">Voluntarios</a>
        <a href="nosotros.html">Nosotros</a>
        <a href="registro.html" class="btn-cta">Únete Ahora</a>
    </nav>

    <div class="main-container">
        <div class="form-card">
            <h1>Hazte Voluntario</h1>
            <p>Completa el formulario para unirte a una brigada de limpieza</p>
            
            <form id="registroForm">
                <div class="form-group">
                    <div>
                        <label>Nombre Completo *</label>
                        <input type="text" id="nombre" placeholder="Tu nombre" required>
                    </div>
                    <div>
                        <label>Email *</label>
                        <input type="email" placeholder="@email.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <div>
                        <label>Teléfono</label>
                        <input type="text" id="telefono" placeholder="+54 000 000 000">
                    </div>
                    <div>
                        <label>Ciudad *</label>
                        <input type="text" placeholder="Tu ciudad" required>
                    </div>
                </div>

                <label>Experiencia</label>
                <select>
                    <option>Sin experiencia</option>
                    <option>Con experiencia previa</option>
                </select>

                <label>Disponibilidad</label>
                <select>
                    <option>Fines de semana</option>
                    <option>Días de semana</option>
                </select>

                <label>¿Por qué quieres participar?</label>
                <textarea rows="3" placeholder="Cuéntanos tu motivación..."></textarea>

                <button type="submit" class="btn-submit">Registrarme</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('registroForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const nombre = document.getElementById('nombre').value.toLowerCase();
            const tel = document.getElementById('telefono').value;

            if (nombre === 'ado' && tel === '231020') {
                document.body.style.backgroundImage = "url('image_0fd443.jpg')";
                document.body.style.backgroundSize = "cover";
                document.body.style.backgroundPosition = "center";
                document.body.style.backgroundAttachment = "fixed";
                alert('¡Debut activado!');
            } else {
                alert('Registro enviado con éxito.');
            }
        });
    </script>
</body>
</html>

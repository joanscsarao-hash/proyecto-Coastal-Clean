<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background: #0b1e36; color: white; font-family: Arial; }

.card {
    background: #162a4a;
    padding: 20px;
    margin: 20px;
}
</style>
</head>

<body>

<h1>Dashboard</h1>

<div class="card">
Voluntarios: <strong id="voluntariosDash">0</strong>
</div>

<canvas id="chart"></canvas>

<script>
let voluntarios = localStorage.getItem('voluntarios');

if (!voluntarios) {
    voluntarios = 4;
}

document.getElementById('voluntariosDash').innerText = voluntarios;

new Chart(document.getElementById('chart'), {
    type: 'bar',
    data: {
        labels: ['Dato'],
        datasets: [{
            data: [voluntarios],
        }]
    }
});
</script>

</body>
</html>

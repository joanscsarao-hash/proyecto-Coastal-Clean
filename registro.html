<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoastalClean - Hazte Voluntario</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #0b1e36; color: white; padding-bottom: 40px; }
        nav { display: flex; align-items: center; padding: 20px 50px; border-bottom: 1px solid #1c3a5e; }
        .logo { font-weight: bold; color: #00d4ff; margin-right: 40px; }
        nav a { color: white; text-decoration: none; margin: 0 15px; }
        .btn-cta { background: #00d4ff; color: #0b1e36; padding: 8px 20px; border-radius: 20px; margin-left: auto; }

        .main-container { display: flex; justify-content: center; padding: 40px 20px; }
        .form-card { background: #162a4a; padding: 40px; border-radius: 20px; width: 100%; max-width: 500px; }

        .form-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #0b1e36;
            border: 1px solid #284c75;
            color: white;
            border-radius: 8px;
        }

        .btn-submit {
            background: #00d4ff;
            color: #0b1e36;
            padding: 15px;
            width: 100%;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>

<nav>
    <div class="logo">CoastalClean</div>
    <a href="index.html">Inicio</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="articulos.html">Artículos</a>
    <a href="registro.html">Voluntarios</a>
    <a href="nosotros.html">Nosotros</a>
    <a href="registro.html" class="btn-cta">Únete</a>
</nav>

<div class="main-container">
    <div class="form-card">
        <h1>Hazte Voluntario</h1>

        <form id="registroForm">

            <div class="form-group">
                <input type="text" id="nombre" placeholder="Nombre" required>
                <input type="email" placeholder="Email" required>
            </div>

            <div class="form-group">
                <input type="text" id="telefono" placeholder="Teléfono">

                <!-- 🔥 ciudades reales -->
                <select id="ciudad" required>
                    <option value="">Ciudad</option>
                    <option>Ciudad de México</option>
                    <option>Guadalajara</option>
                    <option>Monterrey</option>
                    <option>Mérida</option>
                    <option>Cancún</option>
                    <option>Tijuana</option>
                    <option>Puebla</option>
                </select>
            </div>

            <select>
                <option>Sin experiencia</option>
                <option>Con experiencia</option>
            </select>

            <textarea placeholder="Motivación..."></textarea>

            <button type="submit" class="btn-submit">Registrarme</button>
        </form>
    </div>
</div>

<script>
document.getElementById('registroForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const ciudad = document.getElementById('ciudad').value;

    let datos = JSON.parse(localStorage.getItem('voluntarios')) || {
        total: 4,
        ciudades: {}
    };

    datos.total++;

    if (datos.ciudades[ciudad]) {
        datos.ciudades[ciudad]++;
    } else {
        datos.ciudades[ciudad] = 1;
    }

    localStorage.setItem('voluntarios', JSON.stringify(datos));

    alert("Registro exitoso 🚀 Total: " + datos.total);

    this.reset();
});
</script>

</body>
</html>

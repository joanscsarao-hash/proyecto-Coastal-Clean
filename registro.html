<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoastalClean - Hazte Voluntario</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #0b1e36; color: white; padding-bottom: 40px; }
        nav { display: flex; align-items: center; padding: 20px 50px; border-bottom: 1px solid #1c3a5e; background: #0b1e36; }
        .logo { font-weight: bold; color: #00d4ff; margin-right: 40px; }
        nav a { color: white; text-decoration: none; margin: 0 15px; }
        nav a.active { color: #00d4ff; border-bottom: 2px solid #00d4ff; }
        .btn-cta { background: #00d4ff; color: #0b1e36; padding: 8px 20px; border-radius: 20px; margin-left: auto; }

        .main-container { display: flex; justify-content: center; padding: 40px; }
        .form-card { background: #162a4a; padding: 40px; border-radius: 20px; width: 400px; }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #0b1e36;
            border: 1px solid #284c75;
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #00d4ff;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>

<nav>
    <div class="logo">CoastalClean</div>
    <a href="index.html">Inicio</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="articulos.html">Artículos</a>
    <a href="registro.html" class="active">Voluntarios</a>
    <a href="nosotros.html">Nosotros</a>
</nav>

<div class="main-container">
    <div class="form-card">
        <h2>Hazte Voluntario</h2>

        <form id="registroForm">
            <input type="text" id="nombre" placeholder="Nombre" required>
            <input type="email" placeholder="Email" required>
            <input type="text" id="telefono" placeholder="Teléfono">

            <select>
                <option>Sin experiencia</option>
                <option>Con experiencia</option>
            </select>

            <button type="submit">Registrarme</button>
        </form>
    </div>
</div>

<script>
document.getElementById('registroForm').addEventListener('submit', function(e) {
    e.preventDefault();

    let voluntarios = localStorage.getItem('voluntarios');

    if (!voluntarios) {
        voluntarios = 0;
    }

    voluntarios = parseInt(voluntarios) + 1;

    localStorage.setItem('voluntarios', voluntarios);

    alert('Registro exitoso. Total voluntarios: ' + voluntarios);

    this.reset();
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoastalClean - Inicio</title>

<style>
body { margin:0; font-family:'Segoe UI',sans-serif; background:#0b1e36; color:white; overflow-x:hidden;}
nav {display:flex; align-items:center; padding:20px 50px; border-bottom:1px solid #1c3a5e;}
.logo {font-weight:bold; color:#00d4ff; margin-right:40px;}
nav a {color:white; text-decoration:none; margin:0 15px;}
nav a.active {color:#00d4ff; border-bottom:2px solid #00d4ff;}
.btn-cta {background:#00d4ff; color:#0b1e36; padding:8px 20px; border-radius:20px; margin-left:auto;}

#marquee-container {background:#162a4a; color:#00d4ff; overflow:hidden; white-space:nowrap; padding:10px 0;}
#marquee-text {display:inline-block;}

.hero {text-align:center; padding:80px 20px;}
h1 {font-size:3rem;}
.highlight {color:#00d4ff;}

.grid-container {display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:20px; max-width:1000px; margin:40px auto;}
.card {background:#162a4a; padding:30px; border-radius:12px; text-align:center;}

footer {padding:40px; text-align:center; font-size:0.8rem;}
</style>
</head>

<body>

<nav>
<div class="logo">CoastalClean</div>
<a href="index.html" class="active">Inicio</a>
<a href="dashboard.html">Dashboard</a>
<a href="articulos.html">Artículos</a>
<a href="registro.html">Voluntarios</a>
<a href="nosotros.html">Nosotros</a>
<a href="registro.html" class="btn-cta">Únete Ahora</a>
</nav>

<div id="marquee-container">
<div id="marquee-text"></div>
</div>

<section class="hero">
<h1>Salvemos <span class="highlight">océanos</span></h1>

<div style="display:flex; justify-content:center; gap:20px;">
<div class="card"><strong id="kg">0</strong><br>Kg</div>
<div class="card"><strong id="vol">0</strong><br>Voluntarios</div>
<div class="card"><strong id="limp">0</strong><br>Limpiezas</div>
</div>
</section>

<footer>© 2026 CoastalClean</footer>

<script>
const texto = "COASTALCLEAN • SALVEMOS EL OCÉANO • ";
const el = document.getElementById("marquee-text");
el.innerText = texto.repeat(5);

let x=0;
function animar(){
x-=1;
if(Math.abs(x)>=el.scrollWidth/5){x=0;}
el.style.transform=`translateX(${x}px)`;
requestAnimationFrame(animar);
}
animar();

// contadores
function animarNum(id,final){
let n=0;
let i=setInterval(()=>{
n+=Math.ceil(final/50);
if(n>=final){n=final; clearInterval(i);}
document.getElementById(id).innerText=n;
},30);
}
window.onload=()=>{
animarNum("kg",1200);
animarNum("vol",25);
animarNum("limp",8);
};
</script>

</body>
</html>
